<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── LIGHT MODE ── */
:root {
–bg:            #fafaff;
–surface:       #f2eeff;
–purple-deep:   #6b4e96;
–purple-mid:    #a585cc;
–purple-soft:   #c9aee8;
–purple-pale:   #ece5f8;
–purple-ghost:  #f5f0fd;
–text-main:     #2a1e3d;
–text-sub:      #5e5070;
–text-muted:    #9e8fb8;
–name-color:    #8a6bb0;
–title-color:   #6b4f9a;
–motif-stroke:  #a585cc;
–border-rule:   var(–purple-pale);
–input-bg:      #ffffff;
–input-border:  var(–purple-pale);
–msg-bg:        var(–purple-ghost);
–msg-border:    var(–purple-pale);
–tag-active-bg: var(–purple-ghost);
–hint-color:    var(–text-muted);
–orb-op1: 0.15; –orb-op2: 0.12; –orb-op3: 0.13;
}

/* ── DARK MODE ── */
@media (prefers-color-scheme: dark) {
:root {
–bg:            #16121f;
–surface:       #1f1830;
–purple-deep:   #d4aaff;
–purple-mid:    #b88ae0;
–purple-soft:   #9b6ed4;
–purple-pale:   #3a2b55;
–purple-ghost:  #241b38;
–text-main:     #f0e8ff;
–text-sub:      #c8b4e8;
–text-muted:    #8a7aaa;
–name-color:    #c9a8f0;
–title-color:   #c0a0e8;
–motif-stroke:  #7a56b0;
–border-rule:   #3a2b55;
–input-bg:      #1f1830;
–input-border:  #3a2b55;
–msg-bg:        #1f1830;
–msg-border:    #3a2b55;
–tag-active-bg: #2e2248;
–hint-color:    #6e5f8a;
–orb-op1: 0.22; –orb-op2: 0.18; –orb-op3: 0.20;
}
}

html { scroll-behavior: smooth; }

body {
background: var(–bg);
color: var(–text-main);
font-family: ‘Noto Serif SC’, Georgia, serif;
font-weight: 300;
min-height: 100vh;
overflow-x: hidden;
-webkit-font-smoothing: antialiased;
transition: background .4s, color .4s;
}

/* ── ORBS ── */
.orb { position: fixed; border-radius: 50%; filter: blur(88px); pointer-events: none; z-index: 0; transition: opacity .4s; }
.orb-1 { width:540px; height:540px; background:radial-gradient(circle,#c9aee8,transparent 70%); opacity:var(–orb-op1); top:-140px; left:-160px; animation:drift 20s ease-in-out infinite alternate; }
.orb-2 { width:400px; height:400px; background:radial-gradient(circle,#a585cc,transparent 70%); opacity:var(–orb-op2); bottom:-60px; right:-100px; animation:drift 26s ease-in-out infinite alternate-reverse; }
.orb-3 { width:280px; height:280px; background:radial-gradient(circle,#d8c4f0,transparent 70%); opacity:var(–orb-op3); top:48%; left:52%; animation:drift 22s ease-in-out infinite alternate; }
@keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(28px,38px) scale(1.07)} }

/* ── STARS ── */
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; background:var(–purple-soft); border-radius:50%; opacity:0; animation:twinkle var(–dur) ease-in-out infinite var(–delay); }
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(.4)} 50%{opacity:.38;transform:scale(1)} }

/* ── MOTIFS ── */
.motif { position:fixed; pointer-events:none; z-index:0; }
.motif-tl  { top:32px;   left:32px;   opacity:.13; }
.motif-br  { bottom:48px; right:40px; opacity:.11; transform:rotate(180deg); }
.motif-mid { top:38%;    right:52px;  opacity:.08; }
.motif-tr  { top:28px;   right:36px;  opacity:.09; }
.motif-bl  { bottom:56px; left:40px;  opacity:.10; }

/* ── LAYOUT ── */
.page { position:relative; z-index:1; max-width:700px; margin:0 auto; padding:0 44px; }

/* ── HEADER ── */
header { padding-top:96px; padding-bottom:36px; opacity:0; animation:fadeUp 1s ease .1s forwards; }
.eyebrow { font-family:‘Cormorant Garamond’,serif; font-size:11px; letter-spacing:.38em; text-transform:uppercase; color:var(–purple-soft); margin-bottom:18px; }
.site-name { font-family:‘Cormorant Garamond’,serif; font-size:clamp(48px,9vw,76px); font-weight:300; font-style:italic; line-height:1; letter-spacing:-.02em; margin-bottom:22px; color:var(–name-color); }
.header-rule { width:36px; height:1px; background:linear-gradient(90deg,var(–purple-soft),transparent); margin-bottom:20px; }
.site-sub { font-size:12px; color:var(–text-muted); letter-spacing:.1em; line-height:2; }

/* ── ORNAMENT ── */
.ornament-rule { display:flex; align-items:center; gap:12px; margin:0 0 52px; opacity:0; animation:fadeUp 1s ease .38s forwards; }
.ornament-rule .line { flex:1; height:1px; background:linear-gradient(90deg,var(–border-rule),transparent); }
.ornament-rule .line.rev { background:linear-gradient(270deg,var(–border-rule),transparent); }
.ornament-rule .diamond { width:5px; height:5px; background:var(–purple-soft); transform:rotate(45deg); flex-shrink:0; }

/* ── FILTER ── */
.filter-section { margin-bottom:44px; opacity:0; animation:fadeUp .9s ease .5s forwards; }
.filter-hint { font-family:‘Cormorant Garamond’,serif; font-size:11px; font-style:italic; color:var(–hint-color); letter-spacing:.1em; margin-bottom:22px; }
.filter-groups { display:flex; flex-direction:column; gap:14px; }
.filter-group { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
.filter-group-label { font-family:‘Cormorant Garamond’,serif; font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(–text-muted); flex-shrink:0; width:40px; }
.filter-tags { display:flex; flex-wrap:wrap; gap:7px; }
.filter-tag { font-family:‘Noto Serif SC’,serif; font-size:11px; letter-spacing:.1em; color:var(–text-sub); border:1px solid var(–border-rule); padding:4px 13px; cursor:pointer; background:transparent; transition:border-color .25s,color .25s,background .25s; user-select:none; }
.filter-tag:hover { border-color:var(–purple-soft); color:var(–purple-mid); }
.filter-tag.active { border-color:var(–purple-mid); color:var(–purple-deep); background:var(–tag-active-bg); }

/* ── WORKS LABEL ── */
.works-label { font-family:‘Cormorant Garamond’,serif; font-size:10px; letter-spacing:.45em; text-transform:uppercase; color:var(–text-muted); margin-bottom:6px; opacity:0; animation:fadeUp .9s ease .65s forwards; }

/* ── WORKS ── */
.works { display:flex; flex-direction:column; }
.work { display:block; text-decoration:none; color:inherit; padding:36px 0; border-top:1px solid transparent; border-image:linear-gradient(90deg,var(–border-rule) 0%,transparent 100%) 1; position:relative; opacity:0; animation:fadeUp .85s ease forwards; transition:padding-left .4s cubic-bezier(.25,.46,.45,.94); }
.work.hidden { display:none; }
.work::before { content:’’; position:absolute; left:-44px; top:0; bottom:0; width:1.5px; background:linear-gradient(to bottom,transparent 10%,var(–purple-soft) 50%,transparent 90%); opacity:0; transition:opacity .35s; }
.work:hover { padding-left:14px; }
.work:hover::before { opacity:1; }

.work-meta { display:flex; align-items:center; gap:16px; margin-bottom:12px; }
.work-num { font-family:‘Cormorant Garamond’,serif; font-size:10px; letter-spacing:.22em; color:var(–purple-soft); flex-shrink:0; }
.work-tags { display:flex; flex-wrap:wrap; }
.work-tag { font-size:11px; letter-spacing:.12em; color:var(–purple-mid); font-family:‘Noto Serif SC’,serif; cursor:pointer; transition:color .2s; font-weight:400; }
.work-tag:hover { color:var(–purple-deep); }
.work-tag + .work-tag::before { content:’ · ’; color:var(–purple-pale); margin:0 5px; }

.work-title { font-family:‘Cormorant Garamond’,serif; font-size:clamp(24px,4.5vw,36px); font-weight:300; line-height:1.15; letter-spacing:.01em; color:var(–title-color); margin-bottom:10px; transition:color .3s; }
.work:hover .work-title { color:var(–purple-deep); }
.work-desc { font-family:‘Cormorant Garamond’,serif; font-size:16px; font-style:italic; color:var(–text-sub); line-height:1.95; letter-spacing:.04em; font-weight:400; }
.work-arrow { position:absolute; right:0; top:40px; font-size:12px; color:var(–purple-soft); opacity:0; transition:opacity .3s,transform .3s; }
.work:hover .work-arrow { opacity:1; transform:translateX(5px); }

.no-results { font-family:‘Cormorant Garamond’,serif; font-size:14px; font-style:italic; color:var(–text-muted); letter-spacing:.08em; padding:40px 0; display:none; }

/* ── GUESTBOOK ── */
.guestbook-section { margin-top:64px; padding-top:48px; border-top:1px solid var(–border-rule); opacity:0; animation:fadeUp .9s ease 1.1s forwards; }
.guestbook-title { font-family:‘Cormorant Garamond’,serif; font-size:10px; letter-spacing:.45em; text-transform:uppercase; color:var(–text-muted); margin-bottom:32px; }
.guestbook-form { display:flex; flex-direction:column; gap:12px; margin-bottom:36px; }
.form-row { display:flex; gap:12px; }
.form-input {
font-family:‘Noto Serif SC’,serif; font-size:12px; letter-spacing:.06em;
color:var(–text-main); background:var(–input-bg);
border:1px solid var(–input-border); padding:10px 16px;
outline:none; transition:border-color .25s; width:100%;
-webkit-appearance:none;
}
.form-input::placeholder { color:var(–text-muted); }
.form-input:focus { border-color:var(–purple-soft); }
.form-input.name-input { width:180px; flex-shrink:0; }
textarea.form-input { resize:vertical; min-height:80px; line-height:1.8; }
.form-submit {
font-family:‘Cormorant Garamond’,serif; font-size:11px; letter-spacing:.28em;
text-transform:uppercase; color:var(–purple-mid);
border:1px solid var(–border-rule); background:transparent;
padding:9px 24px; cursor:pointer; align-self:flex-end;
transition:border-color .25s,color .25s,background .25s;
}
.form-submit:hover { border-color:var(–purple-mid); color:var(–purple-deep); background:var(–tag-active-bg); }

/* ── MESSAGES ── */
.messages { display:flex; flex-direction:column; gap:16px; }
.message { background:var(–msg-bg); border:1px solid var(–msg-border); padding:18px 20px; animation:fadeUp .5s ease forwards; }
.message-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px; }
.message-name { font-family:‘Cormorant Garamond’,serif; font-size:13px; font-style:italic; color:var(–purple-mid); letter-spacing:.1em; }
.message-time { font-family:‘Cormorant Garamond’,serif; font-size:10px; color:var(–text-muted); letter-spacing:.08em; }
.message-body { font-size:12.5px; color:var(–text-sub); line-height:1.9; letter-spacing:.04em; }
.no-messages { font-family:‘Cormorant Garamond’,serif; font-size:13px; font-style:italic; color:var(–text-muted); letter-spacing:.08em; padding:8px 0; }

/* ── FOOTER ── */
footer { margin-top:16px; padding:44px 0 80px; border-top:1px solid var(–border-rule); display:flex; justify-content:space-between; align-items:center; opacity:0; animation:fadeUp .9s ease 1.25s forwards; }
.footer-name { font-family:‘Cormorant Garamond’,serif; font-size:13px; font-style:italic; color:var(–text-muted); letter-spacing:.18em; }
.footer-links { display:flex; gap:28px; }
.footer-link { font-family:‘Cormorant Garamond’,serif; font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(–purple-mid); text-decoration:none; border-bottom:1px solid transparent; padding-bottom:1px; transition:color .25s,border-color .25s; }
.footer-link:hover { color:var(–purple-deep); border-color:var(–purple-soft); }

/* ── ANIMATION ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* ── RESPONSIVE ── */
@media (max-width: 560px) {
.page { padding:0 24px; }
header { padding-top:60px; }
.work::before { left:-24px; }
.motif-tl,.motif-br,.motif-mid,.motif-tr,.motif-bl { display:none; }
.filter-group { flex-direction:column; gap:8px; }
.filter-group-label { width:auto; }
.form-row { flex-direction:column; }
.form-input.name-input { width:100%; }
}
</style>

</head>

// Shuffle
function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
const shuffled = shuffle(WORKS);

// Build work elements
const listEl    = document.getElementById('worksList');
const noResults = document.getElementById('noResults');
const worksLabel= document.getElementById('worksLabel');
const workEls   = [];

shuffled.forEach((w, idx) => {
  const allTags = [
    w.status,
    ...w.cp,
    w.len,
    w.ending,
    w.margin ? '边限' : '非边限',
    ...w.other
  ];

  const a = document.createElement('a');
  a.className = 'work';
  a.href = w.url;
  a.target = '_blank';
  a.rel = 'noopener';
  a.dataset.tags = allTags.join(',');
  a.style.animationDelay = `${0.72 + idx * 0.04}s`;

  // displayed tags: ordered: 进度 CP 篇幅 结局 其他（非边限不显示）
  const displayedTags = [w.status, ...w.cp, w.len, w.ending, ...w.other,
                          ...(w.margin ? ['边限'] : [])];
  const uniqueTags = [...new Set(displayedTags)];

  a.innerHTML = `
    <div class="work-meta">
      <span class="work-num">${String(idx+1).padStart(2,'0')}</span>
      <div class="work-tags">${uniqueTags.map(t=>`<span class="work-tag">${t}</span>`).join('')}</div>
    </div>
    <div class="work-title">${w.title}</div>
    <div class="work-desc">${w.desc}</div>
    <span class="work-arrow">&#8594;</span>
  `;
  listEl.appendChild(a);
  workEls.push(a);
});

// Filter logic
const knownFilterTags = new Set(
  Array.from(document.querySelectorAll('.filter-tag')).map(b=>b.dataset.tag)
);
let activeTag = null;

function applyFilter() {
  let visible = 0;
  workEls.forEach(w => {
    const tags = w.dataset.tags.split(',').map(t=>t.trim());
    const show = !activeTag || tags.includes(activeTag);
    w.classList.toggle('hidden', !show);
    if(show) visible++;
  });
  let idx=1;
  workEls.forEach(w => {
    if(!w.classList.contains('hidden'))
      w.querySelector('.work-num').textContent = String(idx++).padStart(2,'0');
  });
  noResults.style.display = visible===0 ? 'block' : 'none';
  worksLabel.innerHTML = activeTag
    ? `${activeTag} &nbsp;&middot;&nbsp; ${visible} 篇`
    : `Works &nbsp;&mdash;&nbsp; ${WORKS.length} 篇`;
}

document.querySelectorAll('.filter-tag').forEach(btn => {
  btn.addEventListener('click', () => {
    const tag = btn.dataset.tag;
    activeTag = activeTag===tag ? null : tag;
    document.querySelectorAll('.filter-tag').forEach(b=>b.classList.toggle('active', b.dataset.tag===activeTag));
    applyFilter();
  });
});

// Inline tags
listEl.addEventListener('click', e => {
  const wt = e.target.closest('.work-tag');
  if(!wt) return;
  const tag = wt.textContent.trim();
  if(!knownFilterTags.has(tag)) return;
  e.preventDefault(); e.stopPropagation();
  activeTag = activeTag===tag ? null : tag;
  document.querySelectorAll('.filter-tag').forEach(b=>b.classList.toggle('active', b.dataset.tag===activeTag));
  applyFilter();
});

// Init label
worksLabel.innerHTML = `Works &nbsp;&mdash;&nbsp; ${WORKS.length} 篇`;

// ── Guestbook
const messages   = [];
const messagesEl = document.getElementById('messages');
const noMsgEl    = document.getElementById('noMessages');

function formatTime(d) {
  const pad = n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function renderMessages() {
  // remove existing message divs
  messagesEl.querySelectorAll('.message').forEach(m=>m.remove());
  noMsgEl.style.display = messages.length===0 ? 'block' : 'none';
  [...messages].reverse().forEach(m => {
    const div = document.createElement('div');
    div.className = 'message';
    div.innerHTML = `
      <div class="message-header">
        <span class="message-name">${escHtml(m.name)}${m.title ? ' &nbsp;&middot;&nbsp; <span style="font-style:normal;font-size:12px;color:var(--text-sub)">' + escHtml(m.title) + '</span>' : ''}</span>
        <span class="message-time">${m.time}</span>
      </div>
      <div class="message-body">${escHtml(m.body).replace(/\n/g,'<br>')}</div>
    `;
    messagesEl.appendChild(div);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('gbSubmit').addEventListener('click', () => {
  const name = document.getElementById('gbName').value.trim();
  const title= document.getElementById('gbTitle').value.trim();
  const body = document.getElementById('gbBody').value.trim();
  if(!name || !body) {
    if(!name) document.getElementById('gbName').style.borderColor='var(--purple-mid)';
    if(!body) document.getElementById('gbBody').style.borderColor='var(--purple-mid)';
    return;
  }
  document.getElementById('gbName').style.borderColor='';
  document.getElementById('gbBody').style.borderColor='';
  messages.push({ name, title, body, time: formatTime(new Date()) });
  document.getElementById('gbName').value='';
  document.getElementById('gbTitle').value='';
  document.getElementById('gbBody').value='';
  renderMessages();
});

renderMessages();
</script>
