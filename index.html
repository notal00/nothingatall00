<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>notal00</title>

<style>
@import url('https://fonts.loli.net/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Noto+Serif+SC:wght@300&display=swap');

:root{
--bg:#fafaff;
--purple:#a585cc;
--soft:#f5f0fd;
--text:#2a1e3d;
--muted:#8a7aaa;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:'Noto Serif SC',serif;
}

.container{
max-width:720px;
margin:auto;
padding:40px 20px;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:60px;
font-style:italic;
margin-bottom:10px;
}

.filter{
margin:20px 0;
}

.tag{
display:inline-block;
padding:6px 12px;
margin:4px;
border:1px solid var(--purple);
border-radius:20px;
cursor:pointer;
font-size:14px;
}

.tag.active{
background:var(--soft);
}

.work{
padding:16px 0;
border-bottom:1px solid #eee;
}

.title{
font-size:18px;
color:var(--purple);
}

.desc{
font-size:14px;
color:var(--muted);
}

/* 留言板 */
.msg-box{
margin-top:40px;
}

textarea{
width:100%;
height:80px;
margin-top:10px;
}

button{
margin-top:10px;
padding:6px 12px;
}

.msg{
background:var(--soft);
padding:10px;
margin-top:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">
<h1>notal00</h1>

<div class="filter" id="filters"></div>

<div id="list"></div>

<div class="msg-box">
<h3>留言</h3>
<textarea id="input"></textarea>
<button onclick="addMsg()">提交</button>
<div id="msgs"></div>
</div>

</div>

<script>
const works=[
{title:"作品A",desc:"简介A",tags:["甜","短篇"]},
{title:"作品B",desc:"简介B",tags:["刀","长篇"]},
{title:"作品C",desc:"简介C",tags:["甜"]},
];

let currentTag=null;

function render(){
const list=document.getElementById('list');
list.innerHTML='';
works
.filter(w=>!currentTag||w.tags.includes(currentTag))
.forEach(w=>{
const div=document.createElement('div');
div.className='work';
div.innerHTML=
'<div class="title">'+w.title+'</div>'+
'<div class="desc">'+w.desc+'</div>';
list.appendChild(div);
});
}

function renderTags(){
const allTags=[...new Set(works.flatMap(w=>w.tags))];
const box=document.getElementById('filters');
box.innerHTML='';

allTags.forEach(tag=>{
const el=document.createElement('span');
el.className='tag'+(tag===currentTag?' active':'');
el.innerText=tag;
el.onclick=()=>{
currentTag=tag===currentTag?null:tag;
renderTags();
render();
};
box.appendChild(el);
});
}

function addMsg(){
const val=document.getElementById('input').value.trim();
if(!val)return;
const msgs=JSON.parse(localStorage.getItem('msgs')||'[]');
msgs.unshift(val);
localStorage.setItem('msgs',JSON.stringify(msgs));
document.getElementById('input').value='';
loadMsg();
}

function loadMsg(){
const msgs=JSON.parse(localStorage.getItem('msgs')||'[]');
const box=document.getElementById('msgs');
box.innerHTML='';
msgs.forEach(m=>{
const div=document.createElement('div');
div.className='msg';
div.innerText=m;
box.appendChild(div);
});
}

renderTags();
render();
loadMsg();
</script>

</body>
</html>
